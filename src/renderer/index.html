<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repo Prompt — Cockpit</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="cockpit cockpit-loading" aria-label="Repo Prompt control plane">
      <aside class="cockpit-sidebar" aria-label="Loading sidebar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">RP</span>
          <div class="brand-text">
            <strong>Repo Prompt</strong>
            <span class="brand-sub">Cockpit · read-only</span>
          </div>
        </div>
        <p class="muted small">Connecting to controller…</p>
      </aside>
      <section class="cockpit-loading-panel">
        <p class="eyebrow">Repo Prompt Cockpit</p>
        <h1>Loading control-plane snapshot…</h1>
        <p class="muted">Read-only monitoring. Transcript and log bodies are not loaded or uploaded by default.</p>
      </section>
    </main>
    <script type="module" src="../../dist/src/renderer/index.js"></script>
  </body>
</html>
