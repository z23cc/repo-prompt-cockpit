name: macOS Preview Package

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Build unsigned macOS preview package
        run: pnpm package:mac:dmg

      - name: Upload preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repo-prompt-cockpit-macos-preview
          path: |
            release/*.zip
            release/*.dmg
          if-no-files-found: error
