name: macOS Preview Package

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify Swift package
        run: swift build && swift run RPCodeChecks && node scripts/check-release-hygiene.mjs

      - name: Build native macOS preview bundle
        run: node scripts/package-native-preview.mjs --dmg

      - name: Upload native macOS preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rp-code-macos-preview
          path: |
            release/rp-code-*.zip
            release/rp-code-*.tar.gz
            release/rp-code-*.dmg
            release/native-preview/RP Code.app
            release/native-preview/README.txt
          if-no-files-found: error
