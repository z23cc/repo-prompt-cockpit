name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  native:
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Swift package
        run: swift build

      - name: Run checks
        run: swift run RPCodeChecks

      - name: Release hygiene
        run: node scripts/check-release-hygiene.mjs
